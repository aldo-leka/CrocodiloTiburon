name: CI

on:
  push:
  pull_request:

jobs:
  swift:
    name: Swift package build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build SwiftUI app package
        run: swift build

  python-bridge:
    name: Python bridge syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Compile bridge
        run: python -m py_compile tools/datamule_bridge.py
